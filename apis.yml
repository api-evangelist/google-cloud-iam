name: Google Cloud IAM
description: >-
  Google Cloud Identity and Access Management (IAM) enables fine-grained access
  control and visibility for managing cloud resources. It provides the ability
  to create and manage service accounts, roles, and permissions to enforce
  least-privilege security policies across Google Cloud resources.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/google-cloud-iam/refs/heads/main/apis.yml
created: '2026-03-13'
modified: '2026-03-13'
specificationVersion: '0.18'
tags:
  - Google Cloud
  - IAM
  - Identity
  - Access Management
  - Security
  - Permissions
apis:
  - name: Google Cloud IAM API
    description: >-
      The Cloud IAM API enables management of identity and access control
      policies, service accounts, roles, and permissions for Google Cloud
      resources.
    humanURL: https://cloud.google.com/iam
    baseURL: https://iam.googleapis.com
    tags:
      - IAM
      - Roles
      - Service Accounts
      - Permissions
    properties:
      - type: OpenAPI
        url: openapi/openapi.yml
      - type: JSONSchema
        url: json-schema/service-account.json
      - type: JSONLDContext
        url: json-ld/context.jsonld
