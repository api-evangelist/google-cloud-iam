aid: google-cloud-iam
name: Google Cloud IAM
description: >-
  Google Cloud Identity and Access Management (IAM) enables fine-grained access control and visibility for managing
  cloud resources. It provides the ability to create and manage service accounts, roles, and permissions to enforce
  least-privilege security policies across Google Cloud resources.
