        mapping: $.
    - name: google-cloud-iam-get-service
      description: Google Cloud IAM Get a service account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-service-accounts.getserviceaccount
      with:
        projectId: tools.projectId
