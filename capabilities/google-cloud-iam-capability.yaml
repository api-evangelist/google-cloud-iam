naftiko: 1.0.0-alpha2
info:
  label: Google Cloud IAM API
  description: The Cloud IAM API enables management of identity and access control policies, service accounts, roles, and
    permissions for Google Cloud resources.
  tags:
  - Google
  - Cloud
  - Iam
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
